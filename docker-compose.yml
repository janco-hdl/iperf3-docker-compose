version: '3'

services:
  test:
    build:
      context: iperf3
      dockerfile: Dockerfile
    container_name: "iperf3"
    ports:
      - "5201:5201/tcp"
      - "5201:5201/udp"
    networks:
      - public 
      - private 
    dns_search: .
    command: iperf3 -s -V -d -p 5201            

networks:
  public:
    driver: bridge
  private:
    driver: bridge
